# Exemplo de configuração para o Nginx Global da VPS (/etc/nginx/sites-available/sigoq)

server {
    listen 80;
    server_name sigoq.seudominio.com; # Substitua pelo seu domínio

    # Redirecionar HTTP para HTTPS (Recomendado)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name sigoq.seudominio.com; # Substitua pelo seu domínio

    # Configurações de SSL (Caminhos do Certbot/Let's Encrypt)
    # ssl_certificate /etc/letsencrypt/live/sigoq.seudominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sigoq.seudominio.com/privkey.pem;

    # Aumento do limite de upload para arquivos técnicos
    client_max_body_size 50M;

    # 1. Frontend (React em Container Docker na porta 8002)
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Backend API (Django em Container Docker na porta 8001)
    # Importante: O Django deve estar preparado para receber o cabeçalho X-Forwarded-Proto
    location ~ ^/(usuarios|comercial|orcamentos|clientes|fornecedores|produtos|admin|static-api|media-api)/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Arquivos Estáticos do Django (Admin, etc) e Mídia
    # Estes podem ser servidos diretamente se você mapear volumes, 
    # ou via proxy para o container backend (8001)
    location /static/ {
        proxy_pass http://127.0.0.1:8001/static/;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8001/media/;
    }
}
